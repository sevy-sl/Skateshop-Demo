{% extends 'user/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'orders/payment.css'%}">
{% endblock %}

{% block content %}
<form method="post">
	{% csrf_token %}

	<h2>Payment</h2>

	<label>Card Number</label>
	<input type="text" name="card_number" id="cardInput" minlength="9" maxlength="9" pattern="[0-9]{4} [0-9]{4}" required placeholder="XXXX XXXX">

	<label>Expiry</label>
	<input type="text" name="expiry" id="expiryInput" pattern="[0-9]{2}/[0-9]{2}" placeholder="MM/YY" maxlength="5" required>

	<label>CVV</label>
	<input type="text" pattern="[0-9]{3}"  name="cvv" id="cvvInput" maxlength="3" placeholder="XXX" required>

	<button type="submit" name="pay">Pay</button>
</form>

<script>
	document.getElementById('cardInput').addEventListener('input', function (e) {
		let value = e.target.value.replace(/\D/g, '');
		value = value.substring(0, 8);

		if (value.length > 4) {
			value = value.slice(0, 4) + ' ' + value.slice(4);
		}

		e.target.value = value;
	});
	document.getElementById('expiryInput').addEventListener('input', function (e) {
		let value = e.target.value.replace(/\D/g, ''); 
		value = value.substring(0, 4);

		if (value.length > 2) {
			value = value.slice(0, 2) + '/' + value.slice(2);
		}

		e.target.value = value;
	});
	document.getElementById('cvvInput').addEventListener('input', function (e) {
		let value = e.target.value.replace(/\D/g, ''); 
		e.target.value = value;
	});
</script>
{% endblock %}
